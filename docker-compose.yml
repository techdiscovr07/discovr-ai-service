version: '3.8'

services:
  ai-service:
    build: .
    ports:
      - "8000:8000"
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - MONGODB_URI=${MONGODB_URI:-mongodb://localhost:27017}
      - MONGODB_DATABASE=${MONGODB_DATABASE:-discovr_ai}
      - PORT=8000
    volumes:
      - video_temp:/tmp/discovr-videos
    env_file:
      - .env

volumes:
  video_temp:
